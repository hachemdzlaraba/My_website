<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>موقعي للسيارات</title>

    <style>
        body {
            background-color: black;
            color: white;
            text-align: center;
            font-family: Arial;
        }

        h1 {
            color: red;
        }

        .car {
            border: 1px solid white;
            margin: 20px;
            padding: 15px;
            border-radius: 10px;
        }

        button {
            background-color: red;
            color: white;
            padding: 10px;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: darkred;
        }
    </style>

</head>

<body>

    <h1>🚗 مرحبا بك في موقع السيارات</h1>
    <p>أفضل السيارات في العالم</p>

    <div class="car">
        <h2>BMW</h2>
        <p>سيارة رياضية وفخمة</p>
        <button onclick="alert('تم الاختيار!')">اختر السيارة</button>
    </div>

    <div class="car">
        <h2>Mercedes</h2>
        <p>راحة وقوة عالية</p>
        <button onclick="alert('تم الاختيار!')">اختر السيارة</button>
    </div>

    <div class="car">
        <h2>Audi</h2>
        <p>تصميم عصري وأداء قوي</p>
        <button onclick="alert('تم الاختيار!')">اختر السيارة</button>
    </div>

</body>
</html>
